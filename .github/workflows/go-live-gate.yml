name: Go-Live Gate

# Runs the deployed-API verification suite documented in
# docs/runbooks/go-live.md. The gates prove what unit tests and demos cannot:
# the live tenant reconciles, tenant isolation holds, roles are enforced, the
# API survives concurrent load, and the database can be restored from a backup.
#
# Two entry points, one definition (DRY):
#   - workflow_call:     required by deploy-api.yml before promoting production
#   - workflow_dispatch: on-demand full verification of a deployed environment
#
# Required secrets (repo-level, or scoped to the `environment` chosen):
#   VERIFY_ADMIN_EMAIL     - seeded admin login (accuracy/isolation/rbac/load)
#   VERIFY_ADMIN_PASSWORD  - its password
#   CLOUDFLARE_API_KEY     - wrangler auth (Global API Key): accuracy's live D1
#
# Mandatory-MFA auth (v40): the admin account is admin-tier, so once its 14-day
# MFA grace expires a bare password login returns 403 and wedges the gate. Set
# ONE of these (config.ts/ApiClient.login picks the first that is present):
#   VERIFY_DEMO_SECRET     - X-Demo-Secret for the prod-disabled demo-login path
#                            (preferred; must equal the env's DEMO_LOGIN_SECRET).
#                            Note: demo-login is disabled when ENVIRONMENT=production,
#                            so for a production gate use the TOTP seed instead.
#   VERIFY_ADMIN_TOTP_SEED - base32 authenticator seed for the admin account when
#                            it has MFA enrolled; the gate completes the real
#                            login -> /mfa/validate challenge. Never weaken the
#                            MFA control to make the gate pass.
#                            queries + DR export. Used instead of a scoped token
#                            because D1 query needs full account access.
#   CLOUDFLARE_EMAIL       - account email paired with the Global API Key
#   CLOUDFLARE_ACCOUNT_ID  - wrangler account scope for the same
#
# Optional repo/environment vars (config.ts falls back to vantax prod defaults
# when unset - an unset GitHub var resolves to '' and optionalEnv treats '' as
# "use default", so leaving these blank is safe):
#   VERIFY_API_URL, VERIFY_APP_URL, VERIFY_TENANT_SLUG, VERIFY_D1_DB
#
# Workflow-injection safety: this workflow takes no free-text input that reaches
# a shell. `environment` is a constrained choice and is only used in GitHub
# contexts (job key, concurrency group), never interpolated into a run script.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment whose secrets + URLs to verify'
        type: choice
        options:
          - production
          - staging
        default: production
      run_dr:
        description: 'Run the disaster-recovery restore drill (needs wrangler auth)'
        type: boolean
        default: true
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment whose secrets + URLs to verify'
        type: string
        default: production
      run_dr:
        description: 'Run the disaster-recovery restore drill'
        type: boolean
        default: true

concurrency:
  # The accuracy gate reseeds the shared tenant - never let two gate runs of the
  # same environment overlap, or they will perturb each other's reconciliation.
  group: go-live-gate-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify deployed API
    runs-on: ubuntu-latest
    # Pulls VERIFY_* / CLOUDFLARE_* from the chosen environment's secret scope.
    environment: ${{ inputs.environment }}
    # Accuracy reseeds (~220s) + executes 4 catalysts (~290s); load + DR add ~3
    # min. 30 min leaves generous headroom for cold workers without flapping.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci

      # accuracy + isolation + rbac run under one vitest invocation, so the
      # destructive reseed happens exactly once for all three matrices.
      - name: Accuracy, isolation & RBAC matrices
        run: npm run verify:matrices
        env:
          VERIFY_ADMIN_EMAIL: ${{ secrets.VERIFY_ADMIN_EMAIL }}
          VERIFY_ADMIN_PASSWORD: ${{ secrets.VERIFY_ADMIN_PASSWORD }}
          # Mandatory-MFA auth (see header): set whichever the env uses; unset => ''.
          VERIFY_DEMO_SECRET: ${{ secrets.VERIFY_DEMO_SECRET }}
          VERIFY_ADMIN_TOTP_SEED: ${{ secrets.VERIFY_ADMIN_TOTP_SEED }}
          VERIFY_API_URL: ${{ vars.VERIFY_API_URL }}
          VERIFY_APP_URL: ${{ vars.VERIFY_APP_URL }}
          VERIFY_TENANT_SLUG: ${{ vars.VERIFY_TENANT_SLUG }}
          VERIFY_D1_DB: ${{ vars.VERIFY_D1_DB }}
          # accuracy queries live D1 through wrangler. We authenticate with the
          # Global API Key (full account access, incl. D1) rather than a scoped
          # CLOUDFLARE_API_TOKEN: the scoped token lacks D1 query permission and
          # makes wrangler fail with Cloudflare error 10000. wrangler prefers a
          # token over the Global key when both are set, so we deliberately omit
          # CLOUDFLARE_API_TOKEN here to force the Global-key path.
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Load gate
        run: npm run verify:load
        env:
          VERIFY_ADMIN_EMAIL: ${{ secrets.VERIFY_ADMIN_EMAIL }}
          VERIFY_ADMIN_PASSWORD: ${{ secrets.VERIFY_ADMIN_PASSWORD }}
          # Mandatory-MFA auth (see header): set whichever the env uses; unset => ''.
          VERIFY_DEMO_SECRET: ${{ secrets.VERIFY_DEMO_SECRET }}
          VERIFY_ADMIN_TOTP_SEED: ${{ secrets.VERIFY_ADMIN_TOTP_SEED }}
          VERIFY_API_URL: ${{ vars.VERIFY_API_URL }}
          VERIFY_TENANT_SLUG: ${{ vars.VERIFY_TENANT_SLUG }}

      - name: Disaster-recovery restore drill
        if: ${{ inputs.run_dr }}
        run: npm run verify:dr
        env:
          VERIFY_D1_DB: ${{ vars.VERIFY_D1_DB }}
          # Global API Key auth (see "Accuracy, isolation & RBAC matrices" above):
          # the scoped token lacks D1 permission, so wrangler's export needs the key.
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
