name: Deploy Workers API

on:
  push:
    branches: [main]
    paths:
      - 'workers/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'workers/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - run: npx tsc -b --noEmit
        working-directory: workers/api

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - run: npx vitest run --reporter=verbose
        working-directory: workers/api

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - name: Deploy to Staging
        run: npx wrangler deploy --env staging
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run post-deploy migration
        run: |
          if [ -n "$SETUP_SECRET" ] && [ -n "$API_URL" ]; then
            echo "Running post-deploy migration on staging..."
            HTTP_CODE=$(curl -s -o /tmp/migrate.json -w "%{http_code}" -X POST "${API_URL}/api/v1/admin/migrate" -H "X-Setup-Secret: ${SETUP_SECRET}" -H "Content-Type: application/json")
            echo "Migration response code: $HTTP_CODE"
            cat /tmp/migrate.json
            if [ "$HTTP_CODE" -ge 400 ]; then echo "Migration returned $HTTP_CODE — check logs"; exit 1; fi
          else
            echo "Skipping auto-migration: SETUP_SECRET or API_URL not configured"
          fi
        env:
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          API_URL: ${{ vars.STAGING_API_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - name: Deploy to Production
        run: npx wrangler deploy
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run post-deploy migration
        run: |
          if [ -n "$SETUP_SECRET" ] && [ -n "$API_URL" ]; then
            echo "Running post-deploy migration on production..."
            HTTP_CODE=$(curl -s -o /tmp/migrate.json -w "%{http_code}" -X POST "${API_URL}/api/v1/admin/migrate" -H "X-Setup-Secret: ${SETUP_SECRET}" -H "Content-Type: application/json")
            echo "Migration response code: $HTTP_CODE"
            cat /tmp/migrate.json
            if [ "$HTTP_CODE" -ge 400 ]; then echo "Migration returned $HTTP_CODE — check logs"; exit 1; fi
          else
            echo "Skipping auto-migration: SETUP_SECRET or API_URL not configured"
          fi
        env:
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          API_URL: ${{ vars.PRODUCTION_API_URL }}
      - name: Verify deployment health
        run: |
          if [ -n "$API_URL" ]; then
            HTTP_CODE=$(curl -s -o /tmp/healthz.json -w "%{http_code}" "${API_URL}/healthz")
            echo "Health check: $HTTP_CODE"
            cat /tmp/healthz.json
          fi
        env:
          API_URL: ${{ vars.PRODUCTION_API_URL }}
