name: Deploy Workers API

on:
  push:
    branches: [main]
    paths:
      - 'workers/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'workers/api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - run: npx tsc -b --noEmit
        working-directory: workers/api

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - run: npx vitest run --reporter=verbose
        working-directory: workers/api

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - name: Deploy to Staging
        run: npx wrangler deploy --env staging
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run post-deploy migration
        run: |
          echo "Staging deployment complete. Run migration manually:"
          echo "curl -X POST https://atheon-api-staging.<account>.workers.dev/api/v1/admin/migrate -H 'Authorization: Bearer <superadmin-token>'"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - run: npm ci
        working-directory: workers/api
      - name: Deploy to Production
        run: npx wrangler deploy
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run post-deploy migration
        run: |
          echo "Production deployment complete. Run migration manually:"
          echo "curl -X POST https://atheon-api.<account>.workers.dev/api/v1/admin/migrate -H 'Authorization: Bearer <superadmin-token>'"
