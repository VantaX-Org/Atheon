name: Nightly D1 Backup

# Exports the production D1 database to R2 every night and on demand. Daily
# snapshots are kept for 30 days; monthly snapshots are kept for 12 months
# via the R2 lifecycle rule documented in docs/runbook.md §16.
#
# Disaster recovery contract: at any point in time, we can restore production
# to within 24 hours of the failure. Restore drill: see runbook §16.
#
# Required secrets:
#   - CLOUDFLARE_API_TOKEN — token with `D1:edit` + `R2 Object Storage:edit`
#   - CLOUDFLARE_ACCOUNT_ID
#
# Required Cloudflare resources (created out-of-band, idempotent if re-run):
#   - R2 bucket: atheon-backups
#   - Lifecycle: keep last 30 daily/, last 12 monthly/
#
# Triggers:
#   - schedule: 03:17 UTC nightly (off-peak globally; avoids exact-hour
#     stampede with other infra)
#   - workflow_dispatch: ad-hoc backups (e.g. before risky migration)

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      label:
        description: 'Optional label for ad-hoc backup (e.g. pre-migration-v55)'
        required: false
        type: string

concurrency:
  # Only one backup runs at a time so a manual run during the cron window
  # doesn't double-bill or race the upload.
  group: backup-d1-production
  cancel-in-progress: false

jobs:
  backup:
    name: Export D1 → R2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: workers/api

      - name: Compute backup key
        id: key
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DAY_OF_MONTH=$(date -u +%d)
          LABEL="${{ inputs.label }}"
          if [ -n "$LABEL" ]; then
            # Sanitize label — keep alphanumerics + dashes only.
            CLEAN_LABEL=$(echo "$LABEL" | tr -c '[:alnum:]-' '-' | sed 's/--*/-/g')
            FILENAME="adhoc/${DATE}__${CLEAN_LABEL}.sql"
          elif [ "$DAY_OF_MONTH" = "01" ]; then
            FILENAME="monthly/${DATE}.sql"
          else
            FILENAME="daily/${DATE}.sql"
          fi
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "Backup will be uploaded to: r2://atheon-backups/$FILENAME"

      - name: Export D1 to local file
        run: |
          npx wrangler d1 export atheon-db --remote --output=/tmp/atheon-db.sql
          # Sanity check — empty exports are a failure.
          BYTES=$(stat -c%s /tmp/atheon-db.sql)
          echo "Export size: $BYTES bytes"
          if [ "$BYTES" -lt 1024 ]; then
            echo "::error::Export is suspiciously small ($BYTES bytes) — failing"
            exit 1
          fi
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload to R2
        run: |
          npx wrangler r2 object put "atheon-backups/${{ steps.key.outputs.filename }}" \
            --file=/tmp/atheon-db.sql \
            --content-type=application/sql
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify upload
        run: |
          npx wrangler r2 object get "atheon-backups/${{ steps.key.outputs.filename }}" \
            --file=/tmp/verify.sql
          BYTES=$(stat -c%s /tmp/verify.sql)
          echo "Round-tripped backup size: $BYTES bytes"
          if [ "$BYTES" -lt 1024 ]; then
            echo "::error::Round-trip verification failed"
            exit 1
          fi
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "## D1 Backup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Database:** atheon-db (production)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Backup key:** \`${{ steps.key.outputs.filename }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bucket:** \`atheon-backups\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Restore drill:** docs/runbook.md §16" >> "$GITHUB_STEP_SUMMARY"
