name: Set staging DEMO_LOGIN_SECRET

# One-shot: copy the GitHub `VERIFY_DEMO_SECRET` (production env scope) into the
# staging worker's `DEMO_LOGIN_SECRET` binding so the two match. This lets the
# go-live verification gate authenticate against the STAGING API via the
# purpose-built, secret-gated demo-login path (disabled in production), without
# weakening the mandatory-MFA control for real users.
#
# The secret value never appears in logs: it is read from the secret store and
# piped to wrangler over stdin. Rotate by re-running after changing the GitHub
# secret.

on:
  workflow_dispatch: {}

concurrency:
  group: set-staging-demo-secret
  cancel-in-progress: true

env:
  WORKING_DIR: workers/api

jobs:
  set-secret:
    name: Put DEMO_LOGIN_SECRET on staging worker
    runs-on: ubuntu-latest
    # Reads VERIFY_DEMO_SECRET from the production environment secret scope —
    # the same scope the go-live gate reads it from.
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Gate on required secret
        env:
          VALUE: ${{ secrets.VERIFY_DEMO_SECRET }}
        run: |
          if [ -z "$VALUE" ]; then
            echo "::error::VERIFY_DEMO_SECRET is not set in the production environment scope"
            exit 1
          fi

      - name: Put secret on staging worker
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VALUE: ${{ secrets.VERIFY_DEMO_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # printf (no trailing newline) so the worker secret equals the GitHub
          # secret byte-for-byte — the gate compares them with ===.
          printf '%s' "$VALUE" | npx wrangler secret put DEMO_LOGIN_SECRET --env staging
          echo "DEMO_LOGIN_SECRET set on atheon-api-staging."

      - name: Summary
        if: always()
        env:
          CONCLUSION: ${{ job.status }}
        run: |
          {
            echo "## Set staging DEMO_LOGIN_SECRET"
            echo ""
            echo "- **Worker:** atheon-api-staging"
            echo "- **Binding:** DEMO_LOGIN_SECRET (value masked)"
            echo "- **Conclusion:** $CONCLUSION"
          } >> "$GITHUB_STEP_SUMMARY"
