# Atheon‚ĄĘ Hybrid / On-Premise Deployment
# Usage: docker compose up -d
# Requires: .env file with ATHEON_DEPLOYMENT_ID, ATHEON_LICENCE_KEY, etc.

services:
  api:
    image: ghcr.io/reshigan/atheon-api:${ATHEON_API_TAG:-latest}
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://atheon:atheon@db:5432/atheon}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_BUCKET=${MINIO_BUCKET:-atheon-storage}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-atheon}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-atheon123}
      - ENVIRONMENT=${ENVIRONMENT:-on-premise}
      # ‚ĒÄ‚ĒÄ Hybrid / on-premise license enforcement ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
      # When DEPLOYMENT_ROLE=customer, the Worker phones home to
      # ATHEON_LICENSE_CHECK_URL with LICENCE_KEY every hour and
      # caches the result in CACHE KV. Data-plane requests are
      # blocked with HTTP 503 if the license is revoked, expired, or
      # has not been validated for > 7 days.
      # See workers/api/src/services/license-enforcement.ts.
      - DEPLOYMENT_ROLE=${DEPLOYMENT_ROLE:-customer}
      - LICENCE_KEY=${ATHEON_LICENCE_KEY}
      - ATHEON_LICENSE_CHECK_URL=${ATHEON_LICENSE_CHECK_URL:-https://atheon-api.vantax.co.za/api/agent/license-check}
    restart: unless-stopped
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/healthz', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    image: ghcr.io/reshigan/atheon-agent:${ATHEON_API_TAG:-latest}
    environment:
      - ATHEON_DEPLOYMENT_ID=${ATHEON_DEPLOYMENT_ID}
      - ATHEON_LICENCE_KEY=${ATHEON_LICENCE_KEY}
      - ATHEON_CONTROL_PLANE_URL=${ATHEON_CONTROL_PLANE_URL:-http://api:3000}
      - ATHEON_HEARTBEAT_INTERVAL=${ATHEON_HEARTBEAT_INTERVAL:-60}
      - ATHEON_LOCAL_API_URL=http://api:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-atheon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atheon}
      - POSTGRES_DB=${POSTGRES_DB:-atheon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-atheon}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-atheon123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
  minio_data:
