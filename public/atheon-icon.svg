<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The river mark: a glass A stands in the brand river. Same visual
       language as the live river engine: each stream is a blurred glow
       halo under a bright core, ambient light where they converge, and
       the A is frosted glass that refracts the streams behind it. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e2a"/>
      <stop offset="1" stop-color="#141a3d"/>
    </linearGradient>
    <radialGradient id="ambient" cx=".5" cy=".58" r=".62">
      <stop offset="0" stop-color="#2c3f8f" stop-opacity=".5"/>
      <stop offset="1" stop-color="#0a0e2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".48"/>
      <stop offset=".5" stop-color="#bcd2ff" stop-opacity=".14"/>
      <stop offset="1" stop-color="#8fb0ff" stop-opacity=".26"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset=".45" stop-color="#9db9ff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#6d8dff" stop-opacity=".85"/>
    </linearGradient>
    <clipPath id="tile"><rect width="64" height="64" rx="14"/></clipPath>
    <clipPath id="aglass"><path d="M32 11 L15 52 h8.5 l4-9.5 h9 l4 9.5 h8.5 Z M32 23 l5.6 13.5 h-11.2 Z" clip-rule="evenodd"/></clipPath>
    <filter id="frost" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="spark" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation=".9"/></filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g clip-path="url(#tile)">
    <rect width="64" height="64" fill="url(#ambient)"/>
    <g stroke-linecap="round" fill="none">
      <g filter="url(#halo)" opacity=".55">
        <path d="M-4 40 C 12 40 20 33.5 32 33.5 S 52 40 68 40" stroke="#7d9dff" stroke-width="5.5"/>
        <path d="M-4 44 C 14 44 24 40 34 36 S 54 25 68 20" stroke="#10f5a3" stroke-width="4.5"/>
        <path d="M-4 42 C 16 42 28 44 40 48 S 56 53 68 55" stroke="#ffc23a" stroke-width="3"/>
      </g>
      <path d="M-4 40 C 12 40 20 33.5 32 33.5 S 52 40 68 40" stroke="#7d9dff" stroke-width="2.6" opacity=".95"/>
      <path d="M-4 44 C 14 44 24 40 34 36 S 54 25 68 20" stroke="#10f5a3" stroke-width="2.2"/>
      <path d="M-4 42 C 16 42 28 44 40 48 S 56 53 68 55" stroke="#ffc23a" stroke-width="1.4" opacity=".85"/>
    </g>
    <!-- sparks where streams cross, like river confluence points -->
    <g filter="url(#spark)">
      <circle cx="9" cy="42.8" r="1" fill="#c8fbe8"/>
      <circle cx="48" cy="40.2" r="1" fill="#cfe0ff"/>
      <circle cx="24" cy="42.6" r=".8" fill="#ffe9b8"/>
    </g>
  </g>
  <g clip-path="url(#aglass)">
    <rect width="64" height="64" fill="#0d1230" opacity=".35"/>
    <g filter="url(#frost)" stroke-linecap="round" fill="none">
      <path d="M-4 39 C 12 39 20 32.5 32 32.5 S 52 39 68 39" stroke="#a8bdff" stroke-width="4.4"/>
      <path d="M-4 43 C 14 43 24 39 34 35 S 54 24 68 19" stroke="#5efac0" stroke-width="3.8"/>
      <path d="M-4 41 C 16 41 28 43 40 47 S 56 52 68 54" stroke="#ffd47a" stroke-width="2.6"/>
    </g>
    <rect width="64" height="64" fill="url(#glass)"/>
  </g>
  <!-- apex light -->
  <circle cx="32" cy="11.5" r="2.6" fill="#dfe9ff" opacity=".5" filter="url(#spark)"/>
  <path d="M32 11 L15 52 h8.5 l4-9.5 h9 l4 9.5 h8.5 Z M32 23 l5.6 13.5 h-11.2 Z" fill="none" stroke="url(#edge)" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M30.2 15.5 L20.5 39" stroke="#ffffff" stroke-width="1.1" stroke-linecap="round" opacity=".55"/>
</svg>
