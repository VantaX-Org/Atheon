<html lang="en">

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Atheon" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Atheon™ — Enterprise Intelligence Platform</title>
    <meta name="description" content="Atheon™ by Vanta X — Enterprise Intelligence Platform. Executive Intelligence, Process Intelligence, and Autonomous Execution powered by AI." />
    <!-- Phase 6.6: SEO & Meta Tags -->
    <meta name="keywords" content="enterprise intelligence, AI platform, process mining, executive dashboard, catalyst automation, ERP integration, knowledge graph, South Africa" />
    <meta name="author" content="Vanta X (Pty) Ltd" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://atheon.vantax.co.za" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Atheon™ — Enterprise Intelligence Platform" />
    <meta property="og:description" content="Transform enterprise operations with AI-powered intelligence across Executive, Process, and Autonomous layers." />
    <meta property="og:url" content="https://atheon.vantax.co.za" />
    <meta property="og:site_name" content="Atheon™" />
    <meta property="og:image" content="https://atheon.vantax.co.za/atheon-og.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Atheon™ — Enterprise Intelligence Platform" />
    <meta name="twitter:description" content="AI-powered Enterprise Intelligence by Vanta X." />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Atheon™",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Enterprise Intelligence Platform with Executive Intelligence, Process Intelligence, and Autonomous Execution.",
      "url": "https://atheon.vantax.co.za",
      "author": { "@type": "Organization", "name": "Vanta X (Pty) Ltd", "url": "https://vantax.co.za" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "ZAR" }
    }
    </script>
    <!-- Daylight — Schibsted Grotesk (display + amounts) + IBM Plex Sans (body) + Space Mono (uppercase micro-labels).
         Self-hosted woff2 in /public/fonts — no Google request, works offline and on blocked networks. -->
    <link rel="preload" href="/fonts/SchibstedGrotesk-400-900.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <!-- Iconography is bundled lucide-react (SVG) — no remote icon font, so icons render offline and on blocked networks. -->
    <!-- The PWA manifest is injected at build time by vite-plugin-pwa. -->
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
