name = "atheon-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain route — ensures atheon-api.vantax.co.za persists across deploys
routes = [
  { pattern = "atheon-api.vantax.co.za/*", zone_name = "vantax.co.za" }
]

[vars]
ENVIRONMENT = "production"
# Atheon's own Workers runtime — license enforcement no-ops here (we control
# the runtime). Customer hybrid / on-premise deployments override this to
# 'customer' in their docker-compose.yml so the license-enforcement
# middleware phones home to validate.
DEPLOYMENT_ROLE = "cloud"

[[d1_databases]]
binding = "DB"
database_name = "atheon-db"
database_id = "5b83572b-a06c-45c2-bee4-e4c75552441e"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "ea7decf85cc142099038ad593b7140ae"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "atheon-storage"

[[vectorize]]
binding = "VECTORIZE"
index_name = "atheon-vectors"

# Roadmap C5 — Cloudflare Analytics Engine for APM telemetry.
# Every API request emits one data point (method, path bucket, status,
# response_time_ms, request_id, tenant). Queried by /api/admin/apm/summary
# via the AE SQL API for p50/p95/error-rate per route. The binding is
# free up to 25M write/day in Workers Free tier — well above our SLA.
[[analytics_engine_datasets]]
binding = "APM"
dataset = "atheon_apm"

[durable_objects]
bindings = [
  { name = "DASHBOARD_ROOM", class_name = "DashboardRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["DashboardRoom"]

# Cron Triggers — scheduled tasks (health recalc, briefings, memory auto-population, process mining)
[triggers]
crons = ["*/15 * * * *"]

# Task queue for async catalyst execution (5.2)
[[queues.producers]]
queue = "catalyst-tasks"
binding = "CATALYST_QUEUE"

[[queues.consumers]]
queue = "catalyst-tasks"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "catalyst-dlq"

# DLQ consumer — persists dead-lettered messages to audit_log instead of
# letting them silently vanish (audit §8.6). Single retry because the
# handler should never throw; if it does we ack anyway.
[[queues.consumers]]
queue = "catalyst-dlq"
max_batch_size = 10
max_retries = 1

# ── Staging Environment ──
# Deploy with: wrangler deploy --env staging
# Secrets: wrangler secret put JWT_SECRET --env staging
#          wrangler secret put ENCRYPTION_KEY --env staging
#          wrangler secret put SETUP_SECRET --env staging
[env.staging]
name = "atheon-api-staging"
# Custom domain binding — wrangler auto-creates the DNS record on the
# vantax.co.za zone and provisions Universal SSL. No manual DNS step needed
# before `wrangler deploy --env staging --config wrangler.toml`. First-time
# SSL cert can take 1–5 minutes to propagate before the host serves HTTPS.
routes = [
  { pattern = "staging.atheon-api.vantax.co.za", custom_domain = true }
]

[env.staging.vars]
ENVIRONMENT = "staging"
DEPLOYMENT_ROLE = "cloud"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "atheon-db-staging"
database_id = "5bee4431-ba4e-4f17-80b0-1377e6395d48"

[env.staging.ai]
binding = "AI"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "9ade6ea000a74891929ca643ef925cc4"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "atheon-storage-staging"

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "atheon-vectors-staging"

# C5 staging mirror of the APM dataset — keeps staging telemetry isolated
# from production so smoke runs don't inflate prod percentiles.
[[env.staging.analytics_engine_datasets]]
binding = "APM"
dataset = "atheon_apm_staging"

[env.staging.durable_objects]
bindings = [
  { name = "DASHBOARD_ROOM", class_name = "DashboardRoom" }
]

[env.staging.triggers]
crons = ["*/15 * * * *"]

[[env.staging.queues.producers]]
queue = "catalyst-tasks-staging"
binding = "CATALYST_QUEUE"

[[env.staging.queues.consumers]]
queue = "catalyst-tasks-staging"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "catalyst-dlq-staging"

[[env.staging.queues.consumers]]
queue = "catalyst-dlq-staging"
max_batch_size = 10
max_retries = 1
